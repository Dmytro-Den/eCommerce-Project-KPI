<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог ноутбуків</title>

    <link rel="stylesheet" href="laptops-style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-bar" id="topBar">

        <div class="top-links">
            <a href="#">Про нас</a>
            <a href="#">Доставка</a>
            <a href="#">Контакти</a>
        </div>

        <div class="top-right">
            <a href="#">Підтримка</a>
            <a href="#">Допомога</a>
        </div>

    </div>

    <header id="header">

        <div class="logo">
            <span>Cyber</span> Shop ⚡
        </div>

        <div class="center">

            <a href="index.html">
                <button class="catalog-btn">
                    ← Головна
                </button>
            </a>

            <div class="search-box">

                <div class="search-icon">
                    🔍
                </div>

                <input type="text" placeholder="Я шукаю...">

                <div class="mic">
                    🎤
                </div>

                <button class="search-btn">
                    Знайти
                </button>

            </div>

        </div>

        <div class="right-icons">
            <div class="icon">👤</div>
            <div class="icon">⚖</div>
            <div class="icon">🛒</div>
        </div>

    </header>

    <div class="container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
            <h1 class="title" style="margin-bottom: 0;">
                Каталог ноутбуків
            </h1>
            
            <select id="sortSelect" style="height: 42px; padding: 0 15px; background: #09131d; color: #00e5ff; border: 2px solid #00e5ff; border-radius: 8px; outline: none; cursor: pointer;">
                <option value="">Без сортування</option>
                <option value="asc">Від дешевих до дорогих</option>
                <option value="desc">Від дорогих до дешевих</option>
            </select>
        </div>

        <div class="products" id="products"></div>

        <div class="pagination">

            <button id="prevBtn">
                ← Назад
            </button>

            <span id="pageInfo">
                1 / 3
            </span>

            <button id="nextBtn">
                Вперед →
            </button>

        </div>

    </div>

    <script>

        const topBar = document.getElementById("topBar");
        const header = document.getElementById("header");

        window.addEventListener("scroll", () => {

            if(window.scrollY > 50){

                topBar.style.transform = "translateY(-100%)";
                header.style.top = "0";

            }
            else{

                topBar.style.transform = "translateY(0)";
                header.style.top = "28px";

            }

        });

    </script>

    <div id="simpleModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Заголовок</h2>
            <p id="modalText">Текст</p>
        </div>
    </div>

    <script src="laptops-script.js"></script>

</body>
</html>
